<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Explorer — BVSD</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Slab:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bvsd-blue:  #0e395d;
  --bvsd-med:   #0060a9;
  --bvsd-light: #66a0cb;
  --bvsd-pale:  #ccdfee;
  --bvsd-dark:  #051c2e;
  --bvsd-green: #20B688;
  --bvsd-amber: #e6a026;
  --text:       #282829;
  --muted:      #7e8083;
  --surface:    #f4f7fa;
  --card:       #ffffff;
  --border:     #d0d7de;
  --radius:     10px;
  --panel-w:    300px;
  --hdr:        56px;
}

/* === LAYOUT === */
html, body { height: 100%; overflow: hidden; }
body {
  font-family: Roboto, Arial, sans-serif;
  background: var(--surface);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  height: var(--hdr);
  background: var(--bvsd-blue);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0 1.25rem;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  z-index: 20;
}
header::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 35%; height: 100%;
  background: var(--bvsd-dark);
  clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
  opacity: 0.4;
  pointer-events: none;
}
.hdr-brand { font-family: 'Roboto Slab', Georgia, serif; font-size: 1.1rem; font-weight: 700; position: relative; }
.hdr-sub   { font-size: 0.62rem; color: var(--bvsd-pale); text-transform: uppercase; letter-spacing: .14em; font-weight: 700; position: relative; }
.hdr-div   { width: 1px; height: 26px; background: rgba(255,255,255,.22); }
.hdr-tag   { font-size: 0.78rem; color: var(--bvsd-pale); position: relative; }
.hdr-globe { position: absolute; right: 1.5rem; font-size: 48px; opacity: .1; line-height: 1; pointer-events: none; }

/* Three-column wrapper */
.workspace {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

/* Left summary panel */
#panel-summary {
  width: 0;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  border-right: 0px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--card);
}
#panel-summary.open {
  width: var(--panel-w);
  border-right-width: 1px;
}

/* Right deep-dive panel */
#panel-dive {
  width: 0;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  border-left: 0px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--card);
}
#panel-dive.open {
  width: var(--panel-w);
  border-left-width: 1px;
}

/* Panel shared header strip */
.panel-hdr {
  background: var(--bvsd-blue);
  color: #fff;
  padding: 0.6rem 0.85rem;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--bvsd-pale);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.panel-hdr-title { color: var(--bvsd-pale); flex: 1; }
.panel-hdr-btns  { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.panel-clear-btn, .panel-collapse-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,.3);
  color: rgba(255,255,255,.7);
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 999px;
  cursor: pointer;
  font-family: Roboto, Arial, sans-serif;
  line-height: 1.4;
}
.panel-clear-btn:hover,
.panel-collapse-btn:hover { color: #fff; border-color: #fff; }

/* Collapsed tab state */
#panel-summary.collapsed,
#panel-dive.collapsed {
  width: 28px !important;
  border-color: var(--border);
  cursor: pointer;
}
#panel-summary.collapsed .panel-body,
#panel-dive.collapsed .panel-body { display: none; }
#panel-summary.collapsed .panel-hdr,
#panel-dive.collapsed .panel-hdr {
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  padding: 0.6rem 0;
  height: 100%;
  writing-mode: initial;
}
#panel-summary.collapsed .panel-hdr-title,
#panel-dive.collapsed .panel-hdr-title {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  letter-spacing: .1em;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#panel-summary.collapsed .panel-hdr-btns,
#panel-dive.collapsed .panel-hdr-btns { display: none; }

/* Scrollable panel body */
.panel-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}

/* Center grid */
.col-grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}
.grid-controls {
  padding: 0.75rem 1rem 0;
  flex-shrink: 0;
}
.search-wrap { position: relative; margin-bottom: 0.5rem; }
.search-icon {
  position: absolute; left: 0.7rem; top: 50%;
  transform: translateY(-50%);
  font-size: 13px; color: var(--muted); pointer-events: none;
}
#search {
  width: 100%;
  padding: 0.55rem 0.7rem 0.55rem 2.1rem;
  font-family: Roboto, Arial, sans-serif;
  font-size: 0.84rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--bvsd-med); }
#search::placeholder { color: var(--muted); }

.region-tabs {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 0 1rem 0.6rem;
  flex-shrink: 0;
}
.rtab {
  padding: 0.28rem 0.75rem;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--card);
  font-family: Roboto, Arial, sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.rtab:hover { border-color: var(--bvsd-med); color: var(--bvsd-med); }
.rtab.active { background: var(--bvsd-blue); border-color: var(--bvsd-blue); color: #fff; }

#country-grid {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 1rem 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  align-content: start;
}

/* Country card */
.ccard {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 0.85rem 0.75rem 0.65rem;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  flex-direction: column;
  gap: 3px;
  position: relative;
}
.ccard:hover { border-color: var(--bvsd-med); transform: translateY(-2px); box-shadow: 0 5px 16px rgba(0,96,169,.12); }
.ccard.selected { border-color: var(--bvsd-med); background: var(--bvsd-pale); }
.ccard-flag { font-size: 26px; margin-bottom: 3px; }
.ccard-name { font-size: 0.82rem; font-weight: 700; color: var(--bvsd-blue); line-height: 1.2; }
.ccard-region { font-size: 0.65rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.ccard-actions { display: flex; gap: 5px; margin-top: 6px; }
.ccard-btn {
  flex: 1;
  padding: 0.22rem 0;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-family: Roboto, Arial, sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}
.ccard-btn:hover { border-color: var(--bvsd-med); color: var(--bvsd-med); }
.ccard-btn.active { background: var(--bvsd-med); border-color: var(--bvsd-med); color: #fff; }

/* Status message in grid */
.grid-status {
  grid-column: 1/-1;
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
  font-size: 0.9rem;
}
.grid-status .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

/* === COUNTRY ACCORDION ROW === */
.country-accordion {
  border-bottom: 1px solid var(--border);
  animation: slideIn .2s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.acc-trigger {
  width: 100%;
  padding: 0.7rem 0.85rem;
  background: var(--surface);
  border: none;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  text-align: left;
  transition: background .15s;
  user-select: none;
}
.acc-trigger:hover { background: var(--bvsd-pale); }
.acc-trigger.open  { background: var(--bvsd-pale); }
.acc-flag  { font-size: 20px; flex-shrink: 0; }
.acc-name  { font-size: 0.82rem; font-weight: 700; color: var(--bvsd-blue); flex: 1; line-height: 1.2; }
.acc-chevron { font-size: 0.6rem; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
.acc-trigger.open .acc-chevron { transform: rotate(180deg); }
.acc-remove {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
  line-height: 1;
}
.acc-remove:hover { color: #c0392b; background: #fdf2f2; }

.acc-body { display: none; padding: 0.75rem 0.85rem 0.85rem; }
.acc-body.open { display: block; }

/* Summary tiles inside accordion */
.tile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 0.65rem;
}
.tile {
  border-radius: var(--radius-sm);
  padding: 0.5rem 0.6rem;
}
.tile.blue   { background: #e8f1fa; }
.tile.green  { background: #d4f2e8; }
.tile.amber  { background: #fdefd0; }
.tile.coral  { background: #fde8e8; }
.tile.purple { background: #ede8f5; }
.tile.teal   { background: #d4eeea; }
.tile-icon  { font-size: 13px; }
.tile-label { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--bvsd-med); margin-top: 3px; }
.tile-value { font-size: 0.75rem; font-weight: 700; color: var(--bvsd-blue); line-height: 1.3; margin-top: 1px; }

/* Fact rows inside accordion */
.fact-row {
  display: flex;
  gap: 6px;
  padding: 0.38rem 0;
  border-top: 1px solid var(--border);
  align-items: flex-start;
  font-size: 0.75rem;
}
.fact-row:first-of-type { border-top: none; }
.fact-lbl { font-weight: 700; color: var(--bvsd-med); min-width: 72px; flex-shrink: 0; text-transform: uppercase; font-size: 0.62rem; letter-spacing: .04em; padding-top: 1px; }
.fact-val { color: var(--text); flex: 1; line-height: 1.45; }

/* Loading skeleton */
.skel {
  background: linear-gradient(90deg, #dde8f0 25%, #eef3f8 50%, #dde8f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 5px;
  height: 0.85em;
  margin: 4px 0;
}
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Deep dive field rows */
.dd-field {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 4px;
  padding: 0.38rem 0;
  border-top: 1px solid var(--border);
  font-size: 0.74rem;
}
.dd-lbl { font-weight: 700; color: var(--bvsd-med); text-transform: uppercase; font-size: 0.6rem; letter-spacing: .04em; line-height: 1.4; padding-top: 1px; }
.dd-val { color: var(--text); line-height: 1.45; }

/* Deep dive section accordions inside the panel accordion */
.dd-section { border-top: 1px solid var(--border); margin-top: 4px; }
.dd-section:first-child { border-top: none; margin-top: 0; }
.dd-sec-btn {
  width: 100%;
  padding: 0.4rem 0;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  text-align: left;
}
.dd-sec-btn:hover .dd-sec-title { color: var(--bvsd-med); }
.dd-sec-title {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--bvsd-blue);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 5px;
}
.dd-sec-count {
  background: var(--bvsd-pale);
  color: var(--bvsd-blue);
  font-size: 0.58rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 999px;
}
.dd-sec-chevron { font-size: 0.55rem; color: var(--muted); transition: transform .2s; }
.dd-sec-btn.open .dd-sec-chevron { transform: rotate(180deg); }
.dd-sec-body { display: none; padding-bottom: 4px; }
.dd-sec-body.open { display: block; }

/* Responsive */
@media (max-width: 700px) {
  :root { --panel-w: 260px; }
  .ccard-name { font-size: 0.75rem; }
}
@media (max-width: 500px) {
  .workspace { flex-direction: column; overflow-y: auto; }
  #panel-summary.open, #panel-dive.open { width: 100%; }
  #country-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<header>
  <div>
    <div class="hdr-brand">World Explorer</div>
    <div class="hdr-sub">Boulder Valley School District</div>
  </div>
  <div class="hdr-div"></div>
  <div class="hdr-tag">Discover every country on Earth</div>

<div class="workspace">

        <button class="panel-clear-btn" onclick="event.stopPropagation();clearAll()">Clear</button>
      </div>
    </div>
    <div class="panel-body" id="summary-body"></div>
  </div>

  <!-- CENTER: Country grid -->
  <div class="col-grid">
    <div class="grid-controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search countries…" autocomplete="off">
      </div>
    </div>
    <div class="region-tabs" id="region-tabs"></div>
    <div id="country-grid"></div>
  </div>

  <!-- RIGHT: Deep dive panel -->
  <div id="panel-dive">
    <div class="panel-hdr" onclick="expandIfCollapsed('panel-dive')">
      <span class="panel-hdr-title">🔬 Deep Dive</span>
      <div class="panel-hdr-btns">
        <button class="panel-collapse-btn" onclick="event.stopPropagation();collapsePanel('panel-dive')" title="Collapse">›</button>
        <button class="panel-clear-btn" onclick="event.stopPropagation();clearAll()">Clear</button>
      </div>
    </div>
    <div class="panel-body" id="dive-body"></div>
  </div>

</div>

function emojiFlag(iso) {
  if (!iso || iso.length !== 2) return '🌐';
  return String.fromCodePoint(...[...iso.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}
function gecToFlag(gec) { return emojiFlag(GEC_TO_ISO[gec]); }

// Build flat country list
const allCountries = [];
const _seen = new Set();
for (const [region, list] of Object.entries(COUNTRY_INDEX)) {
  for (const [gec, name] of list) {
    if (!_seen.has(gec)) { _seen.add(gec); allCountries.push({ gec, name, region }); }
  }
}
allCountries.sort((a, b) => a.name.localeCompare(b.name));

// ── State ──
let currentRegion = 'all';
let searchQuery = '';
const selected = [];   // ordered list of {gec, name, region}
const dataCache = {};  // gec -> fetched JSON

// ── Region tabs ──
const tabsEl = document.getElementById('region-tabs');
function buildTabs() {
  tabsEl.innerHTML = '';
  [['all','🌎 All'], ...Object.entries(REGIONS)].forEach(([slug, label]) => {
    const b = document.createElement('button');
    b.className = 'rtab' + (currentRegion === slug ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { currentRegion = slug; buildTabs(); renderGrid(); };
    tabsEl.appendChild(b);
  });
}

// ── Grid ──
const gridEl = document.getElementById('country-grid');
function renderGrid() {
  const q = searchQuery.trim().toLowerCase();
  const filtered = allCountries.filter(c =>
    (currentRegion === 'all' || c.region === currentRegion) &&
    (!q || c.name.toLowerCase().includes(q))
  );
  if (!filtered.length) {
    gridEl.innerHTML = '<div class="grid-status"><span class="emoji">🤷</span>No countries found</div>';
    return;
  }
  gridEl.innerHTML = '';
  filtered.forEach(c => {
    const isSel = selected.some(s => s.gec === c.gec);
    const card = document.createElement('div');
    card.className = 'ccard' + (isSel ? ' selected' : '');
    card.dataset.gec = c.gec;
    card.innerHTML =
      '<div class="ccard-flag">' + gecToFlag(c.gec) + '</div>' +
      '<div class="ccard-name">' + c.name + '</div>' +
      '<div class="ccard-region">' + (REGIONS[c.region] || c.region) + '</div>' +
      '<div class="ccard-actions">' +
        '<button class="ccard-btn' + (isSel ? ' active' : '') + '" onclick="event.stopPropagation();toggleSelect(this,' + JSON.stringify(c) + ')">' +
          (isSel ? '✓ Selected' : '+ Select') +
        '</button>' +
      '</div>';
    card.onclick = () => toggleSelect(null, c);
    gridEl.appendChild(card);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value; renderGrid();
});

// ── Select / deselect ──
function toggleSelect(btn, c) {
  const idx = selected.findIndex(s => s.gec === c.gec);
  if (idx !== -1) {
    selected.splice(idx, 1);
    removeAccordion(c.gec);
  } else {
    selected.push(c);
    addAccordion(c);
    fetchAndRender(c);
  }
  updatePanels();
  renderGrid();
}

function clearAll() {
  selected.length = 0;
  document.getElementById('summary-body').innerHTML = '';
  document.getElementById('dive-body').innerHTML = '';
  updatePanels();
  renderGrid();
}

function updatePanels() {
  const hasAny = selected.length > 0;
  document.getElementById('panel-summary').classList.toggle('open', hasAny);
  document.getElementById('panel-dive').classList.toggle('open', hasAny);
}

// ── Accordion management ──
function addAccordion(c) {
  const flag = gecToFlag(c.gec);

  // Summary accordion
  const sAcc = document.createElement('div');
  sAcc.className = 'country-accordion';
  sAcc.id = 'sacc-' + c.gec;
  sAcc.innerHTML =
    '<div class="acc-trigger open" onclick="toggleAcc(this)">' +
      '<span class="acc-flag">' + flag + '</span>' +
      '<span class="acc-name">' + c.name + '</span>' +
      '<span class="acc-chevron">▲</span>' +
      '<button class="acc-remove" onclick="event.stopPropagation();toggleSelect(null,' + JSON.stringify(c) + ')" title="Remove">✕</button>' +
    '</div>' +
    '<div class="acc-body open" id="sbody-' + c.gec + '">' +
      '<div class="skel" style="width:60%"></div>' +
      '<div class="skel" style="width:80%;margin-top:6px"></div>' +
      '<div class="skel" style="width:50%;margin-top:6px"></div>' +
    '</div>';
  document.getElementById('summary-body').appendChild(sAcc);

  // Deep dive accordion
  const dAcc = document.createElement('div');
  dAcc.className = 'country-accordion';
  dAcc.id = 'dacc-' + c.gec;
  dAcc.innerHTML =
    '<div class="acc-trigger open" onclick="toggleAcc(this)">' +
      '<span class="acc-flag">' + flag + '</span>' +
      '<span class="acc-name">' + c.name + '</span>' +
      '<span class="acc-chevron">▲</span>' +
      '<button class="acc-remove" onclick="event.stopPropagation();toggleSelect(null,' + JSON.stringify(c) + ')" title="Remove">✕</button>' +
    '</div>' +
    '<div class="acc-body open" id="dbody-' + c.gec + '">' +
      '<div class="skel" style="width:60%"></div>' +
      '<div class="skel" style="width:90%;margin-top:6px"></div>' +
      '<div class="skel" style="width:70%;margin-top:6px"></div>' +
    '</div>';
  document.getElementById('dive-body').appendChild(dAcc);
}

function removeAccordion(gec) {
  ['sacc-','dacc-'].forEach(pre => {
    const el = document.getElementById(pre + gec);
    if (el) el.remove();
  });
}

function toggleAcc(btn) {
  btn.classList.toggle('open');
  const body = btn.nextElementSibling;
  body.classList.toggle('open');
  btn.querySelector('.acc-chevron').textContent = body.classList.contains('open') ? '▲' : '▼';
}

// ── Fetch and render ──
async function fetchAndRender(c) {
  let data = dataCache[c.gec];
  if (!data) {
    try {
      const res = await fetch(RAW + '/' + c.region + '/' + c.gec + '.json');
      if (!res.ok) throw new Error('Not found');
      data = await res.json();
      dataCache[c.gec] = data;
    } catch(e) {
      const msg = '<div style="color:#c0392b;font-size:.78rem;padding:.5rem 0">Could not load data: ' + e.message + '</div>';
      const sb = document.getElementById('sbody-' + c.gec);
      const db = document.getElementById('dbody-' + c.gec);
      if (sb) sb.innerHTML = msg;
      if (db) db.innerHTML = msg;
      return;
    }
  }
  renderSummary(c.gec, data);
  renderDeepDive(c.gec, data);
}

// ── Helper ──
function get(obj, ...keys) {
  let cur = obj;
  for (const k of keys) {
    if (!cur || typeof cur !== 'object') return null;
    cur = cur[k];
  }
  if (cur && typeof cur === 'object' && 'text' in cur) return cur.text;
  return cur ?? null;
}

function clean(s) {
  if (!s) return '';
  return s.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
}

// ── Summary render (no background) ──
function renderSummary(gec, d) {
  const el = document.getElementById('sbody-' + gec);
  if (!el) return;

  const popRaw = get(d,'People and Society','Population','total','text') || get(d,'People and Society','Population','text');
  const langRaw = get(d,'People and Society','Languages','language') || get(d,'People and Society','Languages','text');
  const langs = Array.isArray(langRaw) ? langRaw.map(l => l.name||l).join(', ') : (langRaw||null);
  const gdpRaw = get(d,'Economy','Real GDP (purchasing power parity)','Real GDP (purchasing power parity) 2023','text')
              || get(d,'Economy','Real GDP (purchasing power parity)','Real GDP (purchasing power parity) 2022','text')
              || get(d,'Economy','GDP (purchasing power parity)','text');

  const tiles = [
    { icon:'🏙️', label:'Capital',          value: get(d,'Government','Capital','name','text'),                          color:'blue'   },
    { icon:'👥', label:'Population',        value: popRaw ? popRaw.replace(/\(.*?\)/g,'').trim() : null,               color:'green'  },
    { icon:'📐', label:'Area',              value: get(d,'Geography','Area','total','text'),                            color:'amber'  },
    { icon:'💰', label:'GDP (PPP)',         value: fmtGDPShort(gdpRaw),                                                 color:'teal'   },
    { icon:'❤️', label:'Life expectancy',  value: get(d,'People and Society','Life expectancy at birth','total population','text'), color:'coral'  },
    { icon:'🌐', label:'Internet',         value: get(d,'Communications','Internet users','percent of population','text') ? get(d,'Communications','Internet users','percent of population','text') + ' of people' : null, color:'purple' },
  ].filter(t => t.value);

  const rows = [
    { icon:'🗣️', label:'Languages',  value: langs },
    { icon:'🏛️', label:'Government', value: get(d,'Government','Government type','text') },
    { icon:'📍', label:'Location',   value: get(d,'Geography','Location','text') },
    { icon:'🌤️', label:'Climate',    value: get(d,'Geography','Climate','text') },
    { icon:'⛏️', label:'Resources',  value: get(d,'Geography','Natural resources','text') },
    { icon:'🤝', label:'Borders',    value: get(d,'Geography','Land boundaries','border countries','text') },
    { icon:'💵', label:'Currency',   value: get(d,'Economy','Currency','text') || get(d,'Economy','Currency(ies)','text') },
    { icon:'👪', label:'Ethnic groups', value: get(d,'People and Society','Ethnic groups','text') },
    { icon:'🛐', label:'Religions',  value: get(d,'People and Society','Religions','text') },
    { icon:'🎂', label:'Median age', value: get(d,'People and Society','Median age','total','text') },
    { icon:'📖', label:'Literacy',   value: get(d,'People and Society','Literacy','total population','text') },
    { icon:'🏳️', label:'Independence', value: get(d,'Government','Independence','text') },
    { icon:'🎉', label:'Nat. holiday', value: get(d,'Government','National holiday','text') },
    { icon:'🔤', label:'Local name', value: get(d,'Government','Country name','conventional short form','text') },
  ].filter(r => r.value);

  let html = '';
  if (tiles.length) {
    html += '<div class="tile-grid">';
    tiles.forEach(t => {
      html += '<div class="tile ' + t.color + '">' +
        '<div class="tile-icon">' + t.icon + '</div>' +
        '<div class="tile-label">' + t.label + '</div>' +
        '<div class="tile-value">' + t.value + '</div>' +
      '</div>';
    });
    html += '</div>';
  }
  rows.forEach(r => {
    html += '<div class="fact-row">' +
      '<span class="fact-lbl">' + r.label + '</span>' +
      '<span class="fact-val">' + clean(r.value) + '</span>' +
    '</div>';
  });

  el.innerHTML = html || '<div style="color:var(--muted);font-size:.78rem;padding:.5rem 0">No summary data available.</div>';
}

function fmtGDPShort(s) {
  if (!s) return null;
  const t = s.match(/\$([\d.]+)\s*trillion/i); if (t) return '$' + parseFloat(t[1]).toFixed(1) + 'T';
  const b = s.match(/\$([\d.]+)\s*billion/i);  if (b) return '$' + parseFloat(b[1]).toFixed(0) + 'B';
  const m = s.match(/\$([\d.]+)\s*million/i);  if (m) return '$' + parseFloat(m[1]).toFixed(0) + 'M';
  return null;
}

// ── Deep Dive render ──
const DD_SECTIONS = [
  { key:'Introduction',          label:'Introduction',        icon:'📖' },
  { key:'Geography',             label:'Geography',           icon:'🌍' },
  { key:'People and Society',    label:'People & Society',    icon:'👥' },
  { key:'Environment',           label:'Environment',         icon:'🌿' },
  { key:'Government',            label:'Government',          icon:'🏛️' },
  { key:'Economy',               label:'Economy',             icon:'💰' },
  { key:'Energy',                label:'Energy',              icon:'⚡' },
  { key:'Communications',        label:'Communications',      icon:'📡' },
  { key:'Transportation',        label:'Transportation',      icon:'✈️' },
  { key:'Military and Security', label:'Military & Security', icon:'🛡️' },
  { key:'Space',                 label:'Space',               icon:'🚀' },
  { key:'Terrorism',             label:'Terrorism',           icon:'⚠️' },
  { key:'Transnational Issues',  label:'Transnational Issues',icon:'🌐' },
];

function flattenSection(obj, prefix) {
  const rows = [];
  if (!obj || typeof obj !== 'object') return rows;
  for (const [key, val] of Object.entries(obj)) {
    if (key === 'text') continue;
    const label = prefix ? prefix + ' — ' + key : key;
    if (val && typeof val === 'object') {
      if ('text' in val) {
        const t = clean(val.text);
        if (t) rows.push({ label, value: t });
        for (const [sk, sv] of Object.entries(val)) {
          if (sk === 'text') continue;
          const sl = label + ' — ' + sk;
          if (sv && typeof sv === 'object' && 'text' in sv) { const t2 = clean(sv.text); if (t2) rows.push({ label: sl, value: t2 }); }
          else if (typeof sv === 'string' && sv.trim()) rows.push({ label: sl, value: clean(sv) });
          else if (Array.isArray(sv)) { const a = sv.map(i => typeof i==='object'?(i.name||i.text||''):i).filter(Boolean).join(', '); if(a) rows.push({ label: sl, value: a }); }
        }
      } else if (Array.isArray(val)) {
        const a = val.map(i => typeof i==='object'?(i.name||i.text||''):i).filter(Boolean).join(', ');
        if (a) rows.push({ label, value: a });
      } else {
        rows.push(...flattenSection(val, label));
      }
    } else if (typeof val === 'string' && val.trim()) {
      rows.push({ label, value: clean(val) });
    }
  }
  return rows;
}

function renderDeepDive(gec, data) {
  const el = document.getElementById('dbody-' + gec);
  if (!el) return;
  let html = '';
  let first = true;
  for (const sec of DD_SECTIONS) {
    const sdata = data[sec.key];
    if (!sdata) continue;
    const rows = flattenSection(sdata, '');
    if (!rows.length) continue;
    const open = first; first = false;
    html += '<div class="dd-section">' +
      '<button class="dd-sec-btn' + (open?' open':'') + '" onclick="toggleDDSec(this)">' +
        '<span class="dd-sec-title">' + sec.icon + ' ' + sec.label + ' <span class="dd-sec-count">' + rows.length + '</span></span>' +
        '<span class="dd-sec-chevron">' + (open?'▲':'▼') + '</span>' +
      '</button>' +
      '<div class="dd-sec-body' + (open?' open':'') + '">';
    rows.forEach(r => {
      const lbl = r.label.replace(/^ — /,'');
      html += '<div class="dd-field"><div class="dd-lbl">' + lbl + '</div><div class="dd-val">' + r.value + '</div></div>';
    });
    html += '</div></div>';
  }
  el.innerHTML = html || '<div style="color:var(--muted);font-size:.78rem;padding:.5rem 0">No data available.</div>';
}

function toggleDDSec(btn) {
  btn.classList.toggle('open');
  const body = btn.nextElementSibling;
  body.classList.toggle('open');
  btn.querySelector('.dd-sec-chevron').textContent = body.classList.contains('open') ? '▲' : '▼';
}

function collapsePanel(id) {
  const panel = document.getElementById(id);
  panel.classList.add('collapsed');
  // Update collapse button to become expand arrow when clicked on the tab
}

function expandIfCollapsed(id) {
  const panel = document.getElementById(id);
  if (panel.classList.contains('collapsed')) {
    panel.classList.remove('collapsed');
  }
}

// ── Init ──
buildTabs();
renderGrid();
</script>
